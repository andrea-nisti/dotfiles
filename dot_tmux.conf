# ==========================
# === GENERAL BEHAVIOR =====
# ==========================

# --- Behavior ---
set -g default-terminal "tmux-256color"
set-option -g default-shell /bin/zsh
set -g mouse on
set -g bell-action none
set -g escape-time 10
set -g prefix C-a
set -g update-environment "DISPLAY WAYLAND_DISPLAY XAUTHORITY XDG_RUNTIME_DIR DBUS_SESSION_BUS_ADDRESS SSH_AUTH_SOCK"
unbind C-b

# --- Keymaps ---
bind r source-file ~/.tmux.conf
bind C-a send-prefix
bind _ split-window -v

# --- Appearance ---
set -g status-right "%H:%M"
set -g window-status-current-style "underscore"
display-message "tmux config loaded"
set -g message-style 'fg=yellow bg=red bold'
setw -g clock-mode-colour yellow

# ==========================
# === COPY MODE ============
# ==========================

# --- Behavior ---
setw -g mode-keys vi
set -g set-clipboard on

# --- Keymaps ---
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe 'sh -c '\''
if [ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null 2>&1; then
  wl-copy
elif [ -n "$DISPLAY" ] && command -v xclip >/dev/null 2>&1; then
  xclip -selection clipboard -i
elif [ -n "$DISPLAY" ] && command -v xsel >/dev/null 2>&1; then
  xsel --clipboard --input
else
  tmux load-buffer -
fi
'\''' \; send-keys -X cancel

# --- Appearance ---
set-window-option -g mode-style "fg=black,bg=yellow,bold"

# ==========================
# === NAVIGATION ===========
# ==========================

# --- Behavior ---

# --- Keymaps ---

# --- Appearance ---
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'
